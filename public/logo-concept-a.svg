<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" fill="none">
  <!-- Background (transparent) -->

  <!-- A1 lettermark -->
  <!-- Custom "A" with arrow built into the peak -->
  <g>
    <!-- Left leg of A -->
    <path d="M 30 78 L 58 22 L 62 22 L 90 78 L 78 78 L 60 36 L 42 78 Z" fill="#0A1628"/>
    <!-- Crossbar of A -->
    <rect x="45" y="58" width="30" height="7" rx="1" fill="#0A1628"/>
    <!-- Arrow tip replacing top of A (gold triangle pointing up) -->
    <polygon points="60,8 53,24 67,24" fill="#C9A84C"/>
  </g>

  <!-- "1" numeral -->
  <g>
    <!-- Stem of 1 -->
    <rect x="104" y="22" width="10" height="56" rx="2" fill="#0A1628"/>
    <!-- Top serif/flag of 1 -->
    <path d="M 88 36 L 104 22 L 114 22" stroke="#0A1628" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Base serif -->
    <rect x="90" y="72" width="34" height="7" rx="3" fill="#0A1628"/>
  </g>

  <!-- Divider line -->
  <rect x="158" y="28" width="2" height="44" rx="1" fill="#C9A84C" opacity="0.4"/>

  <!-- "GROUP" wordmark -->
  <text
    x="172"
    y="50"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="8"
    fill="#0A1628"
  >GROUP</text>

  <!-- Tagline -->
  <text
    x="172"
    y="68"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="9"
    letter-spacing="3"
    fill="#C9A84C"
    opacity="0.9"
  >MARKETING AGENCY</text>
</svg>
