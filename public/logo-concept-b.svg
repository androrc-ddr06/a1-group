<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" fill="none">

  <!-- Hexagon badge -->
  <polygon
    points="50,12 72,12 84,32 84,68 72,88 50,88 38,68 38,32"
    fill="#0A1628"
  />
  <!-- Inner gold accent ring -->
  <polygon
    points="50,16 70,16 81,34 81,66 70,84 50,84 39,66 39,34"
    fill="none"
    stroke="#C9A84C"
    stroke-width="1.5"
    opacity="0.5"
  />

  <!-- A1 inside badge -->
  <!-- "A" -->
  <path d="M 46 70 L 55 34 L 57 34 L 66 70 L 62 70 L 56 46 L 50 70 Z" fill="white"/>
  <rect x="51" y="58" width="10" height="5" rx="0.5" fill="white"/>
  <!-- Arrow tip on A -->
  <polygon points="56,26 52,35 60,35" fill="#C9A84C"/>

  <!-- "1" -->
  <rect x="69" y="34" width="7" height="36" rx="1.5" fill="white"/>
  <path d="M 61 43 L 69 34 L 76 34" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- "GROUP" wordmark -->
  <text
    x="100"
    y="48"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="24"
    letter-spacing="6"
    fill="#0A1628"
  >GROUP</text>

  <!-- Tagline -->
  <text
    x="101"
    y="66"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="9"
    letter-spacing="3"
    fill="#C9A84C"
  >MARKETING AGENCY</text>

</svg>
